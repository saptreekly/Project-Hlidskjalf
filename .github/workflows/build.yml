name: Build Kernel Driver

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linux-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Format Check
      run: cargo fmt --all -- --check

    - name: Lint Check
      run: cargo clippy --features fuzzing -- -D warnings

    - name: Unit Tests
      run: cargo test --lib

  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc
        components: rustfmt, clippy

    - name: Format Check
      run: cargo fmt --all -- --check

    - name: Lint Check
      run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

    - name: Build
      env:
        WDK_PATH: C:\Program Files (x86)\Windows Kits\10
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Unit Tests
      run: cargo test --lib
